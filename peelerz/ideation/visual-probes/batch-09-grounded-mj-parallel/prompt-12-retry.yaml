defaults:
  mode: image
  model: gemini-3.1-flash-lite-image
  aspect_ratio: "16:9"
  image_size: 1K
  num_outputs: 1
  system_prompt: >
    Create one live-action cinematic Peelerz music-video styleframe, never a collage or storyboard
    grid. Preserve Tina as the same young woman with long brown hair, blue jacket, black top, pink
    lychee gummy, and pink Peelerz pouch. Keep the visual idea simple and physically legible. Favor
    tactile practical effects, warm key light, cyan fill, restrained pearly pink bounce, and sparse
    composition. Do not invent any narrative mechanism beyond the peeled car skin becoming a
    parachute. No visible crew, studio equipment, floating islands, generic candyland, random rainbow
    effects, captions, borders, or watermarks.

jobs:
  - title: 12 parachute hero image retry
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../batch-04-lite/outputs/2026-07-13/gemini-31-flash-lite-image/15_tina-stop-motion-neighborhood_384e9992/tina-stop-motion-neighborhood_01.png
      - ../../../script/PEELERZ - 03 - car peels open.png
    prompt: >
      Image 1 controls Tina, wardrobe, product, and intact dark rear passenger compartment. Image 2
      controls the miniature tropical world, fish, and warm-cyan-pink music-video palette. Image 3
      supplies only the established car-peel canopy premise. Create a wide hero image: Tina and the
      opened passenger compartment lift gently beneath a pearly pink parachute made from the car's own
      peeled outer skin. The curled peel visibly forms the canopy and its continuous tethers. The small
      colorful tropical neighborhood is below, under a clear teal sky, with a sparse school of gummy
      fish drifting beside Tina. Golden backlight passes through the canopy. No conventional fabric
      parachute, airplane, giant hand, floating island, ocean, or extra mechanism.
