defaults:
  mode: image
  model: gemini-3.1-flash-lite-image
  aspect_ratio: 16:9
  image_size: 1K
  num_outputs: 1
  system_prompt: >
    Generate exploratory cinematic candy-commercial styleframes. Follow the stated role of each
    reference image. When Image 1 is named as the edit target, preserve its subject, face, wardrobe,
    car interior, camera position, and photographic realism unless the prompt explicitly changes
    them. Avoid captions, panel borders, watermarks, generic candyland, and random rainbow effects.

jobs:
  - title: tina mural becomes alive
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 02 - Tina takes bite.png
    prompt: >
      Image 1 is the edit target and composition anchor. Image 2 is supporting identity and pink
      lychee candy reference only. Preserve Tina from Image 1, her bookish eighteen-year-old
      appearance, face, hair, wardrobe, seated pose, pink Peelerz package, rideshare interior,
      camera position, and ordinary afternoon light. Change only the world visible outside the
      passenger window. A faded tropical mural on one Los Angeles stucco wall is quietly becoming
      real: painted leaves lift into physical jewel-green foliage, mango blossoms unfold into the
      street, and one painted bird becomes three-dimensional. Tina has not noticed yet. Keep the
      rest of the street documentary-real and slightly drab. Tactile practical surrealism, subtle
      first-stage transformation, youthful but not childish. Do not borrow Image 2 camera angle or
      crop. No added characters inside the car, no fantasy glow, no text.

  - title: tina tropical change approaches
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 02 - Tina takes bite.png
    prompt: >
      Image 1 is the edit target. Image 2 supports Tina identity and candy appearance only. Preserve
      the exact Tina, wardrobe, car interior, camera relationship, and foreground product from Image
      1. Change only the exterior beyond the window. The far end of the ordinary gray Los Angeles
      block has become a lush tropical world and the transformation is moving toward the car:
      pavement cracks release glossy leaves, hedges begin growing luminous mangoes, and jewel-colored
      flowers climb one house while the nearest house remains normal. Make the progression from dull
      foreground street to verdant distance unmistakable. Tina is still unaware. Photoreal cinematic
      VFX concept frame, restrained and appetizing, no candyland, no cartoon fruit faces, no text.

  - title: tina one impossible house
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 02 - Tina takes bite.png
    prompt: >
      Treat Image 1 as the edit target. Preserve Tina, her face, hair, clothing, seated position,
      package, candy, car interior, and camera. Image 2 is a support reference for her identity and
      the translucent pink candy only. Outside the window every house remains ordinary except one.
      Its open front door reveals a dense glowing mango forest vastly larger inside than the house,
      extending for miles with mist, jewel-like fruit, and tiny distant figures. Warm tropical light
      spills from the impossible doorway onto the sidewalk while the building exterior stays normal.
      Tina has just begun to notice. Quiet cinematic surrealism, one impossible place, realistic Los
      Angeles neighborhood, no portal ring, no generic magic particles, no text.

  - title: tina different hour at every house
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 02 - Tina takes bite.png
    prompt: >
      Image 1 is the edit target and must retain Tina, her wardrobe, face, pose, product, car interior,
      and neutral afternoon lighting. Image 2 is identity and candy support only. Change the continuous
      residential block beyond the passenger window so each adjacent property exists at a different
      hour: blue dawn with sprinklers, hard noon with short shadows, glowing mango-gold sunset, deep
      fruit-colored night with porch lights. Architecture and perspective remain continuous with no
      panel borders or graphic dividers. Tina occupies one normal present moment inside the car and
      studies the impossible sequence. Photoreal commercial styleframe, poetic and immediately legible,
      no labels, clocks, split screen, fantasy particles, or text.

  - title: tina reflections transform first
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 02 - Tina takes bite.png
    prompt: >
      Use Image 1 as the edit target and preserve Tina, wardrobe, face, hair, pose, product, car,
      camera, and ordinary street. Image 2 only reinforces Tina identity and the pink lychee gummy.
      The actual neighborhood outside remains normal, but the reflection layered across the passenger
      window shows the same street as a lush tropical Gummyverse with glowing mango trees, enormous
      flowers, warm jewel light, and distant airborne gummy fish. The two realities overlap across
      Tina face in the glass while remaining spatially readable. She notices the reflection before
      the real world changes. Subtle photographic double exposure grounded in real glass reflection,
      cinematic and mysterious, no duplicated Tina, no portal, no text.

  - title: tina neighborhood stagehands
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
