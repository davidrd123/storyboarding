defaults:
  mode: image
  model: gemini-3.1-flash-lite-image
  aspect_ratio: "16:9"
  image_size: 1K
  num_outputs: 2
  system_prompt: >
    Make only the requested delta to Image 1. Preserve its camera, composition, people, identity,
    expressions, environment, geography, lighting, color grade, and every unmentioned element. Image 2,
    when attached, is exact design authority for the replacement. Return one clean cinematic 16:9 frame,
    no collage, captions, labels, borders, or watermark.

jobs:
  - title: 18 burst frame mecha fidelity correction
    images:
      - outputs/2026-07-14/gemini-31-flash-lite-image/05_05-mango-shell-bursts-into-mecha_6bd384a3/05-mango-shell-bursts-into-mecha_01.png
      - ../batch-15-raul-meg-assets-grape/outputs/2026-07-14/gemini-31-flash-lite-image/04_04-mango-mecha-design-sheet_7a048a3f/04-mango-mecha-design-sheet_01.png
    prompt: >
      Use case: ads-marketing. Replace only Raul's soft rounded orange body armor in Image 1 with the exact
      articulated mango mecha from Image 2, keeping Raul's real uncovered face in the open aperture. Keep
      the five opening peel sections, mango helpers, lightning, Meg, pose, camera, and bleachers unchanged.
      The new armor has clear hard-surface panel breaks and glowing translucent gummy joints. No weapons.

  - title: 19 hero frame mecha fidelity correction
    images:
      - outputs/2026-07-14/gemini-31-flash-lite-image/07_07-finished-mecha-and-hype-crew_e9fb2c27/07-finished-mecha-and-hype-crew_01.png
      - ../batch-15-raul-meg-assets-grape/outputs/2026-07-14/gemini-31-flash-lite-image/04_04-mango-mecha-design-sheet_7a048a3f/04-mango-mecha-design-sheet_01.png
    prompt: >
      Use case: ads-marketing. Replace only Raul's orange suit in Image 1 with the exact articulated mango
      mecha from Image 2, scaled to the same standing figure and retaining Raul's real uncovered face.
      Preserve the wide camera, top-row position, Meg, ten mango helpers, field, sky, and all lighting.
      No weapon, helmet, bodybuilder anatomy, or change to the helper line.

  - title: 20 familiar actually bows correction
    images:
      - outputs/2026-07-14/gemini-31-flash-lite-image/12_12-grape-familiar-bows-on-empty-seat_e55e5528/12-grape-familiar-bows-on-empty-seat_01.png
      - ../batch-15-raul-meg-assets-grape/outputs/2026-07-14/gemini-31-flash-lite-image/02_08-grape-familiar-direct-mutation_c8fe6756/08-grape-familiar-direct-mutation_01.png
    prompt: >
      Use case: ads-marketing. Change only the single grape familiar's pose in Image 1. It bends forward
      into a deep solemn theatrical bow toward Meg, head lowered, one tiny hand holding the edge of its
      translucent peel-cape outward. Preserve its exact design from Image 2 and preserve Meg, scale,
      empty-seat position, stadium, camera, and dusk light unchanged. No second creature or standing pose.
