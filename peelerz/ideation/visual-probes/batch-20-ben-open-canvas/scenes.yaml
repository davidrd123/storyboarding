defaults:
  mode: image
  model: gemini-3.1-flash-lite-image
  aspect_ratio: "16:9"
  image_size: 1K
  num_outputs: 2
  system_prompt: >
    Create one extraordinary but coherent cinematic Peelerz commercial styleframe, never a collage,
    contact sheet, storyboard grid, or design sheet. Ben's brief is an open canvas: favor a bold whole-
    world creative situation over improving any existing car-peel, parachute, or mango-mecha idea.
    Preserve only the explicitly declared talent/location authorities. Make the prompt's single
    impossible rule visible at world scale with one dominant verb, clear spatial organization, and a
    youthful sense of wonder. The result can be excessive, mythic, psychedelic, deadpan, or impossible,
    but must remain benign, appetizing, and not preschool-coded. No car opening into petals, no
    parachute, no robot/mecha armor, no construction-helper crew, no rainbow arch, no generic cheering
    gummy crowd, no captions, labels, borders, watermarks, gore, weapons, or invented package copy.

jobs:
  - title: 01 campus buildings migrate
    images:
      - ../../../script/PEELERZ - 09 - campus walk.png
      - ../../../script/PEELERZ - 10 - campus connection.png
    prompt: >
      REFERENCE AUTHORITY — Images 1 and 2 lock Liz and John, their wardrobe, Peelerz bags, campus-step
      entrance, and warm live-action register. They do not lock the later world.
      ONE RULE — At Liz and John's shared first bite, every campus building inhales, lifts its complete
      foundation on four enormous architectural legs, and begins a quiet seasonal migration across the
      horizon. The original stone step beneath the couple is the only architecture that stays grounded.
      FRAME — Deadpan daylight super-wide from slightly below the steps. Liz and John remain normal-size
      at center, smiling in recognition with their Peelerz bags. Behind them, a library, gymnasium,
      dormitory, clock tower, and lecture hall stride in one majestic herd at different distances; each
      carries attached lawns, trees, sidewalks, and tiny calmly commuting students. One moving lecture
      hall lowers a staircase so students can board while it walks. Buildings have no faces and are not
      monsters. Their legs remain made from their own columns, foundations, and staircases.
      VISUAL PROOF — fixed couple and step; five recognizable moving buildings; complete land parcels
      traveling with them; ordinary people treating migration as the new commute. AVOID — earthquake,
      destruction, floating buildings, giant animals disguised as buildings, fantasy castle, crowd panic.

  - title: 02 time sheds whole eras outside tina window
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 02 - Tina takes bite.png
    prompt: >
      REFERENCE AUTHORITY — Images 1 and 2 lock Tina, blue hoodie, rear-seat position, car interior,
      lychee Peelerz, and the intimate bite. The car itself stays ordinary and intact.
      ONE RULE — Each distant musical tuning note causes the entire neighborhood to shed its current
      historical era as one complete translucent street-shaped shell, revealing a different era below.
      FRAME — Cinematic passenger-side view holding Tina's calm profile and gummy in the foreground while
      the world outside dominates. Above the active street hang three enormous hollow cast-off versions
      of the exact same block: a translucent 1950s suburb, a present-day strip mall, and an overgrown
      future, each including ghost-thin roads, utility poles, cars, signs without readable text, and
      building facades. Beneath those shells the live street is a saturated practical 1970s Japanese-
      fantasy city with rooftop musicians visibly tuning. Tina's unhurried bite is the still point.
      VISUAL PROOF — three complete discarded time-shells separated in depth above one current street;
      Tina sees all eras through one ordinary window. AVOID — peeling the car, time-travel portal,
      duplicate Tinas, generic multiverse circles, city destruction, clock graphics, collage panels.

  - title: 03 the camera joins tina scene
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 02 - Tina takes bite.png
    prompt: >
      REFERENCE AUTHORITY — Images 1 and 2 lock Tina, wardrobe, intact car, rear seat, product moment,
      and live-action identity. The surrounding world may be replaced.
      ONE RULE — The cinema camera filming the commercial grows elegant folded-paper arms and legs,
      climbs through Tina's open passenger window, and starts physically rebuilding the photographed
      neighborhood into a portable theatrical world for her. A second unseen viewpoint films this event.
      FRAME — Playful wide from outside the intact car. Tina holds the exact bite pose, delighted rather
      than frightened. A full-size professional cinema camera is halfway through the window on articulated
      white paper limbs. With one hand it lifts the real live-action street upward like a broad scenic
      flat; immediately behind that moving edge, houses, sky, trees, and traffic become layered paper-
      theatre scenery with visible folds, tabs, and practical shadows. Its other hand unfolds one paper
      cloud above Tina. Keep the camera unmistakably a camera, without face or mascot eyes.
      VISUAL PROOF — camera body, paper limbs, its hands physically holding the live-action-to-paper
      boundary, Tina's ordinary car crossing both materials. AVOID — animated camera logo, robot camera,
      camera-headed human, car transformation, giant hand from outside, paper flower, movie-set crew.

  - title: 04 stadium exchanges scale with gummy interior
    images:
      - ../../../script/PEELERZ - 05 - park bench.png
      - ../batch-17-reference-authorities/outputs/06-daylight-top-bleachers-world-plate.png
      - ../../../references/stills/97882-PeelerzGummy-Mango-Sample__43665.jpg
    prompt: >
      REFERENCE AUTHORITY — Image 1 locks Raul and Meg's identities and friendship. Image 2 locks the
      daylight high-school bleachers and live football game. Image 3 locks dense peeled mango-candy
      material. No mecha transformation occurs.
      ONE RULE — The exterior football stadium shrinks into a meticulous live working model on the snack
      tray between Raul and Meg, while the soft interior of Raul's bitten mango gummy expands into the
      only remaining full-size stadium.
      FRAME — Deadpan daylight medium-wide at the top bleachers. Raul and Meg sit normally beside a
      cafeteria-size tray holding the entire tiny stadium: microscopic bleachers, moving players, field,
      scoreboard, lights, and crowd, all operating. Raul holds one bitten peeled mango gummy above it.
      The gummy has a clean dollhouse-like cutaway: within its soft yellow-orange interior is a vast
      full-size football arena receding miles into luminous mango space, with normal-size players visible
      deep inside. The actual landscape around the teenagers is now mostly empty grass where the stadium
      used to be. Everyone in the tiny crowd continues watching the game.
      VISUAL PROOF — real teenagers; tray-sized exterior stadium; one small gummy containing a visibly
      immense interior stadium; empty real landscape. AVOID — snow globe, toy packaging, ordinary screen,
      portal ring, mecha, giant gummy mascot, mini helpers, body horror.

  - title: 05 football field becomes animal borne archipelago
    images:
      - ../../../script/PEELERZ - 05 - park bench.png
      - ../batch-17-reference-authorities/outputs/06-daylight-top-bleachers-world-plate.png
      - ../../../references/amos-peelerz-all-3-flavors-w9ABMl70E60/selected/still-007.png
    prompt: >
      REFERENCE AUTHORITY — Image 1 locks Raul and Meg. Image 2 locks daylight high-school stadium
      geography and the view from the isolated upper bleachers. Image 3 supplies only the lush appetizing
      scale of a fruit world, not its composition. Raul remains an ordinary teenager; no mecha appears.
      ONE RULE — At halftime, the painted yard-line geometry separates the football field into six
      complete islands. Each island rises on the back of a different colossal, gentle gummy animal and
      carries its exact football formation into the sky.
      FRAME — Awe-inspiring daylight super-wide over Raul and Meg's shoulders. The bleachers remain as a
      shoreline around an empty field-shaped basin. Six geometric turf islands float at different heights,
      still bearing goalposts, yard numbers, players, cheerleaders, and slices of running track. Their
      undersides rest visibly on enormous translucent fruit-gummy creatures: a whale, tortoise, manta ray,
      crane, elephant, and long fish, each colored by a different Peelerz flavor and textured as appetizing
      sugar-dusted candy. At the former fifty-yard line, both teams plant one glowing mango seed and a
      small new sun begins growing from it. Raul and Meg share collective wonder.
      VISUAL PROOF — empty stadium basin; six intact field-islands; six clearly supporting gummy animals;
      football formations continuing on top. AVOID — ordinary floating rocks, gummy bears, cheering mascot
      crowd, disaster, frightened players, robots, weapons, generic rainbow.

  - title: 06 tina crosses a sleeping fruit cosmology
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 02 - Tina takes bite.png
      - ../../../references/amos-peelerz-all-3-flavors-w9ABMl70E60/selected/still-007.png
    prompt: >
      REFERENCE AUTHORITY — Images 1 and 2 lock Tina, intact car, and lychee product entrance. Image 3
      supplies appetizing tropical fruit-world material only. This is a radical world reveal, not a car
      transformation or flight scene.
      ONE RULE — Tina discovers that her entire neighborhood is a ceremonial game arranged across the
      sleeping body of a continent-sized fruit being; her bite makes it laugh gently in its sleep, and
      each breath rearranges streets, seasons, and tiny fruit societies across its surface.
      FRAME — Vast benign mythic panorama with intricate playful detail, photographed like a premium
      practical fantasy film rather than children's animation. Tina's ordinary dark car is a tiny but
      visible object on a road crossing the luminous cheek of a colossal serene sleeper made from mango,
      lychee, grape, and edible peel forms. Its closed eye is a lake; its hair is a tropical archipelago;
      its shoulders hold miniature cities and ceremonial sports. A soft sleeping smile sends one visible
      wave across the body: ahead is lush summer, behind is crystalline fruit-winter, and tiny societies
      cheerfully move their houses between seasons. Tina looks from the car window in cosmic mischief.
      VISUAL PROOF — recognizable tiny car and road; unmistakable continent-scale sleeping fruit body;
      multiple inhabited regions; one breath-wave reorganizing seasons. AVOID — horror giant, realistic
      flesh, Buddha or direct religious iconography, fruit portrait close-up, floating fruit collage,
      car peeling, parachute, generic candyland, destruction.
