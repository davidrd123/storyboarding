defaults:
  mode: image
  model: gemini-3.1-flash-lite-image
  aspect_ratio: "16:9"
  image_size: 1K
  num_outputs: 2
  system_prompt: >
    Create a polished reference-ready character or industrial-design turntable on a clean neutral studio
    background. Maintain one consistent design across every angle and callout. These are ingredients for a
    cinematic live-action Peelerz commercial, so candy characters must look tactile, translucent,
    appetizing, and capable of being composited into later frames. No scene narrative, stadium, people,
    packaging, slogans, labels, borders, watermarks, weapons, horror, generic gummy bears, or preschool
    mascot styling unless a prompt explicitly requests otherwise.

jobs:
  - title: 01 mango crew character sheet
    images:
      - ../batch-13-raul-meg-fable-adapted/outputs/2026-07-14/gemini-31-flash-lite-image/05_05-mango-pit-crew_770c759b/05-mango-pit-crew_01.png
      - ../batch-11-tina-gummy-hands-region/outputs/2026-07-14/gemini-31-flash-lite-image/02_02-coordinated-roof-crew_b6739d8a/02-coordinated-roof-crew_01.png
    prompt: >
      Use case: ads-marketing. Image 1 supplies the energetic mango-helper attitude and scale only; do
      not reproduce Raul, Meg, signs, words, speed lines, or the crowd. Image 2 supplies the tactile
      gummy translucency and coordinated crew behavior only; do not reproduce the car or pink lychee
      color. Design one cute mango-shaped gummy crew character: a small plump orange-gold mango fruit
      silhouette with a subtle green leaf tuft, translucent jewel-jelly body, stubby arms and legs,
      expressive cheerful face, and no clothing. Turntable layout: full-body front, three-quarter front,
      strict side, and back views, plus two smaller action callouts showing the same design hauling with
      both hands and cheering. Add one close detail of the face and leaf tuft. Space every view apart on
      matte off-white with identical lighting. No text, mini-human anatomy, bear ears, tools, or views
      touching each other.

  - title: 02 grape familiar character sheet
    images:
      - ../batch-14-raul-meg-paired-pass/outputs/2026-07-14/gemini-31-flash-lite-image/02_06-meg-coaxes-imp-from-gummy-retry_46083f64/06-meg-coaxes-imp-from-gummy-retry_01.png
      - ../batch-13-raul-meg-fable-adapted/outputs/2026-07-14/gemini-31-flash-lite-image/02_08-green-imp-arrives-retry_3b93e8b8/08-green-imp-arrives-retry_01.png
    prompt: >
      Use case: ads-marketing. Both images supply only the tiny character's human-hand scale, simple
      gummy anatomy, and intimate personality; remove the women and bleachers completely. Redesign it
      as one mischievous grape familiar: a small round deep-violet translucent grape gummy with tiny
      hands and feet, sly intelligent eyes, and a peeled translucent grape skin worn as a pointed hood
      and short cape. The hood is clearly edible stretchy candy, not cloth. Turntable layout: full-body
      front, three-quarter front, strict side, and back views, plus two smaller action callouts showing
      the identical familiar taking a dramatic bow and holding a joyful swan-dive pose. Add one close
      detail of the sly face and translucent peel hood. Space every view apart on matte off-white with
      identical lighting. Sophisticated dry charm, no horns, wings, tail, demon anatomy, bear ears,
      green color, labels, or scene elements.

  - title: 03 grape bunch multiplicity sheet
    images:
      - ../batch-14-raul-meg-paired-pass/outputs/2026-07-14/gemini-31-flash-lite-image/02_06-meg-coaxes-imp-from-gummy-retry_46083f64/06-meg-coaxes-imp-from-gummy-retry_01.png
    prompt: >
      Use case: ads-marketing. The reference supplies only tactile gummy translucency and tiny-hand
      scale; remove Meg, the green color, and the stadium. Design a compact bunch of twelve round
      deep-violet grape gummies clinging together into a recognizable grape-cluster silhouette. Each
      grape is a tiny related character with miniature arms and a different restrained expression.
      Show one main intact bunch plus a secondary action view where three grapes pop free and wave while
      the remaining bunch retains its shape. Glossy translucent candy with a small edible green gummy
      stem, matte off-white studio background, clean product-design presentation. No generic grapes,
      realistic fruit skin, gummy bears, swarm chaos, words, packaging, or human figures.

  - title: 04 mango mecha design sheet
    images:
      - ../../inspo/311a8df1f7c9f54a8faf504ce830212c.jpg
      - ../../inspo/bffb4e02bb8c1c9bcd969a83557163f2.jpg
      - ../../../script/PEELERZ - 07 - mango voltron.png
    prompt: >
      Use case: ads-marketing. Images 1 and 2 supply articulated heroic hard-surface mecha proportions,
      panel breaks, and industrial-design clarity only; remove all guns, military markings, and opaque
      plastic toy finish. Image 3 supplies the requirement that Raul's real human face remains visible
      at the center and the broad mango-orange silhouette, but reject its blocky pixel design. Create a
      sleek mango mecha suit displayed on a neutral featureless dark mannequin, with an unobstructed open
      face aperture ready to frame Raul's real head later. Articulated limbs, translucent amber gummy
      joints glowing from within, and glossy mango-peel armor panels shaped with subtle fruit curves.
      Turntable layout: full-body front, three-quarter front, strict side, and back views plus close detail
      callouts of a shoulder plate and glowing joint. Clean pale-gray studio background, identical light
      across views. Premium cinematic concept design, agile rather than bodybuilder-heavy. No recognizable
      pilot face, helmet over the face, weapons, wings, vehicle parts, logos, captions, or pineapple.
