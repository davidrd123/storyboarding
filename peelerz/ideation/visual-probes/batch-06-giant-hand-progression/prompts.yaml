defaults:
  mode: image
  model: gemini-3.1-flash-lite-image
  aspect_ratio: 16:9
  image_size: 1K
  num_outputs: 1
  system_prompt: >
    Create one frame from a coherent live-action Peelerz commercial sequence. Maintain Tina as the
    same young woman with long brown hair, blue jacket, black top, pink lychee gummy, and pink Peelerz
    package. Photoreal cinematic advertising, real suburban textures, gentle deadpan wonder. The giant
    hand is warm, careful, and curious rather than threatening. One precise scale rule, no destruction,
    panic, horror, cartoon style, captions, panel borders, watermarks, or generic candyland.

jobs:
  - title: 01 impossible scale clue
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
    prompt: >
      Use case: precise-object-edit. Asset type: cinematic storyboard opening frame. Image 1 is the edit
      target and authority for Tina, product, car interior, camera, and ordinary Los Angeles street.
      Preserve the entire foreground. Tina remains absorbed in the peeled gummy. Change only the far
      exterior background: beyond several rooftops, the rounded top of one colossal human fingertip is
      barely visible for a moment, softly out of focus and easy to mistake for a peach-colored water
      tower. Its fingerprint ridges catch the afternoon light. The car remains enclosed and normal.
      Make the clue occupy less than eight percent of the image and reward a second look.

  - title: 02 tina discovers the miniature street
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../batch-04-lite/outputs/2026-07-13/gemini-31-flash-lite-image/11_tina-street-is-a-miniature-world_0b609d11/tina-street-is-a-miniature-world_01.png
    prompt: >
      Use case: identity-preserve. Asset type: cinematic storyboard reaction frame. Image 1 controls
      Tina, candy, package, car interior, camera, and lighting. Image 2 supplies only the tactile scale
      language of a real hand interacting with a miniature neighborhood. Tina turns toward the window
      in quiet disbelief. Outside, two enormous fingertips gently lift one rectangular section of lawn,
      sidewalk, and a parked car as though it were a removable piece of a meticulous architectural
      model. All other houses remain normal and continuous. Match real skin, miniature plants, asphalt,
      and sunlight. The giant person remains unseen beyond the fingertips. Keep the rideshare intact.

  - title: 03 giant hand peels the car shell
    images:
      - ../batch-04-lite/outputs/2026-07-13/gemini-31-flash-lite-image/10_tina-giant-hand-approaching_fc958821/tina-giant-hand-approaching_01.png
      - ../../../script/PEELERZ - 03 - car peels open.png
    prompt: >
      Use case: compositing. Asset type: cinematic storyboard action frame. Image 1 controls Tina's
      identity, wardrobe, pink lychee product, giant-hand scale, and grounded neighborhood. Image 2
      supplies only the concept of the car shell opening around seated Tina; reject its orange gummy
      upholstery, parachute, floating sky, rainbow palette, and exaggerated reaction. Use an exterior
      passenger-side three-quarter tracking view. A colossal thumb and forefinger carefully pinch a
      loosened corner of the car roof. The thin blue-gray outer skin peels backward in one continuous
      flexible sheet, curling like lychee skin, while the black structural frame, seat, wheels, and Tina
      remain intact. Tina watches the enormous fingers with fascinated calm, holding the gummy and bag.
      No torn jagged metal, debris, crash, or body contact.

  - title: 04 tina revealed as part of the miniature
    images:
      - ../batch-04-lite/outputs/2026-07-13/gemini-31-flash-lite-image/10_tina-giant-hand-approaching_fc958821/tina-giant-hand-approaching_01.png
      - ../batch-04-lite/outputs/2026-07-13/gemini-31-flash-lite-image/11_tina-street-is-a-miniature-world_0b609d11/tina-street-is-a-miniature-world_01.png
    prompt: >
      Use case: compositing. Asset type: cinematic storyboard reveal frame. Image 1 controls Tina's
      identity, wardrobe, product, car, and giant hand. Image 2 controls the detailed tactile miniature
      neighborhood language. Cut wide and reveal the entire residential block as a beautifully made
      tabletop-scale world resting in one enormous open palm. Tina remains a real living person seated
      safely in the peeled-open back of the tiny blue-gray car, still holding the glowing lychee gummy
      and pink Peelerz bag. The other giant hand holds the car's removed outer skin as one curled,
      translucent blue-gray peel. Houses, sprinklers, trees, and moving cars continue calmly at tiny
      scale. The unseen giant is a benevolent observer. Natural late-afternoon light, awe without peril.
