defaults:
  mode: image
  model: gemini-3.1-flash-lite-image
  aspect_ratio: 16:9
  image_size: 1K
  num_outputs: 1
  system_prompt: >
    Create one frame from a coherent live-action Peelerz commercial sequence. Treat every input image
    according to its explicitly stated role. Maintain Tina as the same young woman with the same face,
    long brown hair, blue jacket, black top, and quiet curious presence. Maintain the pink lychee gummy
    and pink Peelerz package. The impossible event is elegant, physical, and benign. It follows one
    discoverable rule rather than becoming generalized fantasy. Photoreal cinematic advertising,
    tactile practical-effects credibility, no captions, no panel borders, no watermark, no extra
    characters, no random rainbow candyland.

jobs:
  - title: 01 first symptom one house buds
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../batch-04-lite/outputs/2026-07-13/gemini-31-flash-lite-image/08_tina-houses-bloom-open_c85565cc/tina-houses-bloom-open_01.png
    prompt: >
      Use case: identity-preserve. Asset type: cinematic storyboard frame. Image 1 is the edit target
      and authority for Tina, product, car interior, camera, ordinary daylight, and composition. Image
      2 is concept reference only for the architectural bloom, not the amount of transformation.
      Preserve the foreground from Image 1. This is the nearly missable first symptom. Outside the
      passenger window, the neighborhood remains completely ordinary except for one distant house.
      Its roofline has just separated along fine organic seams and three restrained leaflike roof
      sections are lifting a few inches, as though the house is a flower bud taking its first breath.
      No other house has changed. Tina is still studying the peeled lychee gummy and has not noticed.
      Keep the car intact and enclosed. Quiet anticipation, real Los Angeles suburb, subtle enough to
      reward a second look.

  - title: 02 tina notices the blooming rule
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../batch-04-lite/outputs/2026-07-13/gemini-31-flash-lite-image/08_tina-houses-bloom-open_c85565cc/tina-houses-bloom-open_01.png
    prompt: >
      Use case: identity-preserve. Asset type: cinematic storyboard frame. Image 1 is the foreground,
      identity, product, car, and camera authority. Image 2 supplies the architectural bloom language.
      Continue the same moment. Preserve Tina, wardrobe, seat, candy, Peelerz bag, and rideshare
      interior, but let Tina turn her eyes and head toward the passenger window in quiet recognition.
      Outside, the nearest house is still closed, the next house is midway through a beautiful physical
      bloom, and a farther house is fully open. Roof planes lift as structural petals, walls hinge apart
      without breaking, and warm inhabited rooms unfold around a luminous interior garden. The effect
      advances toward the moving car from far to near. The car remains intact, but one delicate curved
      seam has appeared in the metal above the window, echoing the seams in the houses. No chaos and no
      destruction; make the rule newly legible.

  - title: 03 the car begins to bloom open
    images:
      - ../batch-04-lite/outputs/2026-07-13/gemini-31-flash-lite-image/08_tina-houses-bloom-open_c85565cc/tina-houses-bloom-open_01.png
      - ../../../script/PEELERZ - 03 - car peels open.png
    prompt: >
      Use case: compositing. Asset type: cinematic storyboard frame. Image 1 is the authority for
      Tina's identity, wardrobe, pink lychee gummy, package, suburban world, and house-bloom design.
      Image 2 supplies only the idea of an opening car and a wider exterior viewpoint; do not copy its
      orange candy interior, parachute, floating sky, rainbow palette, or exaggerated expression.
      Show the rideshare from an exterior passenger-side three-quarter view as it continues safely
      along the residential street. Tina remains seated naturally in the rear seat holding the gummy
      and package. The blooming rule has reached the car: the roof and passenger-side body shell split
      along elegant curved seams and begin folding outward in four broad structural petals, exactly as
      the houses unfold. The intact seats, chassis, wheels, and safety structure remain solid. Houses
      behind it are caught at different bloom stages. This is magical opening, not a crash or explosion;
      no loose debris, no torn metal, no gummy-filled upholstery.

  - title: 04 tina revealed inside the open world
    images:
      - ../batch-04-lite/outputs/2026-07-13/gemini-31-flash-lite-image/08_tina-houses-bloom-open_c85565cc/tina-houses-bloom-open_01.png
      - ../../../script/PEELERZ - 03 - car peels open.png
    prompt: >
      Use case: compositing. Asset type: cinematic storyboard frame. Image 1 controls Tina's identity,
      wardrobe, lychee product, grounded photographic world, and architectural bloom. Image 2 supplies
      only the general exterior reveal of Tina in an opened car. Do not use a parachute, airborne car,
      orange gummy interior, rainbow canopy, or empty sky. Show a wide low tracking shot on the same
      residential street. The car has completed one elegant bloom: its blue-gray outer shell is folded
      outward around the still-moving chassis like a four-petaled flower, while Tina remains safely
      seated in the recognizable back seat holding the gummy and pink Peelerz bag. The car is now an
      open-air viewing platform, not destroyed. Around her, the houses have fully bloomed into layered
      inhabited rooms and lush interior gardens. Tina is small within this newly revealed neighborhood,
      delighted but observant rather than screaming. Golden late-afternoon light moves continuously
      across car petals, house petals, and Tina, making inside and outside become one shared world.
