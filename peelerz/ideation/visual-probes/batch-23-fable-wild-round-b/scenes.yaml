defaults:
  mode: image
  model: gemini-3.1-flash-lite-image
  aspect_ratio: "16:9"
  image_size: 1K
  num_outputs: 1
  system_prompt: >
    Create one polished coherent cinematic Peelerz commercial styleframe, never a collage, storyboard,
    contact sheet, or character sheet. Treat the impossible idea as one physical rule photographed in one
    world. Preserve only declared reference roles. Raul and Meg remain together in high-school football
    bleachers. Liz and John remain together on campus. Mango helpers are irregular translucent fruit-like
    gummy pieces with minimal features, not gummy bears or preschool mascots. Driver scenes use restrained,
    deadpan documentary realism with exactly one impossible channel. Candy stretches rather than tears.
    Benign, appetizing, youthful, visually legible. No weapons, gore, horror, generic portals, rainbow arches,
    captions, borders, watermarks, or invented package copy.

jobs:
  - title: 01 raul becomes the wave
    images:
      - ../../../script/PEELERZ - 05 - park bench.png
      - ../batch-15-raul-meg-assets-grape/outputs/2026-07-14/gemini-31-flash-lite-image/01_07-mango-crew-direct-turntable_090c3b00/07-mango-crew-direct-turntable_02.png
    prompt: >
      Image 1 locks Raul and Meg, relocated together to crowded night football bleachers. Image 2 locks the
      irregular translucent mango-helper material only. The crowd performs the wave, but the moving crest is
      physically made of hundreds of small mango gummy figures rippling through successive rows and gently
      lifting spectators as they pass. Raul's ordinary body dissolves only at the leading edge into identical
      mango units while Meg reaches toward him, fully engaged. Wide stadium view shows human wave behind,
      gummy crest, and Raul-to-crest transition. No water wave, explosion, giant robot, detached Raul clone,
      empty stands, or panic.

  - title: 02 giant by headcount
    images:
      - ../../../script/PEELERZ - 05 - park bench.png
      - ../../../script/PEELERZ - 06 - anime transformation.png
      - ../batch-15-raul-meg-assets-grape/outputs/2026-07-14/gemini-31-flash-lite-image/01_07-mango-crew-direct-turntable_090c3b00/07-mango-crew-direct-turntable_02.png
    prompt: >
      Images 1 and 2 lock Raul's face and night stadium identity; Image 3 locks mango-helper material. On the
      football field stands a colossal human silhouette of Raul built entirely from thousands of hand-sized
      irregular mango gummy helpers holding one another shoulder-to-shoulder. His recognizable face exists as
      a coordinated mosaic of their bodies, not one giant smooth face. Several units climb into the final gaps
      while Meg and the crowd share candy below. Stadium floodlights reveal the headcount construction. No
      armor shell, single orange giant, gummy bears, stone statue, empty field, or attack pose.

  - title: 03 missing minion
    images:
      - ../../../script/PEELERZ - 05 - park bench.png
      - ../batch-15-raul-meg-assets-grape/outputs/2026-07-14/gemini-31-flash-lite-image/01_07-mango-crew-direct-turntable_090c3b00/07-mango-crew-direct-turntable_02.png
    prompt: >
      Image 1 supplies Raul, Meg, bleachers, and warm identity; Image 2 locks mango-helper form. Extreme close
      view of one giant raised hand assembled from hundreds of small mango helpers gripping one another, with
      exactly one helper-shaped gap visible in its palm. Far below but still readable on the bleacher beside
      Meg, the missing mango helper remains seated and offers her one purple candy instead of joining the hand.
      Raul smiles from within the huge formation. Warm night stadium light, comic tenderness. No severed hand,
      anatomy, smooth robot glove, generic crowd, multiple gaps, or disengaged Meg.

  - title: 04 band finally in tune
    images:
      - ../batch-15-raul-meg-assets-grape/outputs/2026-07-14/gemini-31-flash-lite-image/01_07-mango-crew-direct-turntable_090c3b00/07-mango-crew-direct-turntable_02.png
      - ../../../script/PEELERZ - 05 - park bench.png
    prompt: >
      Image 1 locks the tiny irregular mango-helper species; Image 2 supplies football-stadium realism only.
      A high-school marching band plays on the sideline at golden hour, entirely mundane except that dozens of
      tiny mango helpers peer from trumpet and tuba bells, ride the trombone slides, and hold sheet music in
      perfect synchronization. Musicians remain unbothered and focused. Brass reflections clearly repeat the
      orange gummy forms. Deadpan medium-wide photograph. No animated instruments, giant mascots, confetti,
      text, chaotic swarm, or preschool staging.

  - title: 05 new fares
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../batch-11-tina-gummy-hands-region/outputs/2026-07-14/gemini-31-flash-lite-image/06_06-miniature-gummy-neighborhood-crew_35621a5a/06-miniature-gummy-neighborhood-crew_01.png
    prompt: >
      Image 1 locks the ordinary dark sedan and rideshare register but Tina is not present. Image 2 supplies
      only the scale of small fruit-like gummy passengers. At dusk, a middle-aged rideshare driver leans on
      his completely ordinary sedan while a polite single-file queue of small lychee, mango, and grape gummy
      fruit people boards through the open rear door exactly like bus passengers. One pays him with a long
      curl of edible candy peel held like a fare ticket. Everything else is mundane documentary reality.
      No miniature neighborhood, transformed car, mascot party, glowing magic, giant candy, or readable app UI.

  - title: 06 shared stretch admission
    images:
      - ../../../script/PEELERZ - 09 - campus walk.png
      - ../../../script/PEELERZ - 10 - campus connection.png
    prompt: >
      Images lock Liz and John, wardrobe, campus steps, product, and their shared approach. At golden hour they
      each hold one end of a single translucent two-layer gummy stretched exactly one meter between them. The
      edible outer peel and center remain visibly distinct and both elongate without tearing. The taut candy
      bends the background light into a broad taffy lens while their eyes remain locked in the charged instant
      before snap-back. Product-forward medium-wide, no extra hands, no rope, no portal, no giant candy sheet,
      no duplicate gummies, and no disengaged expressions.

  - title: 07 queue at the sky
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 11 - candy grove.png
    prompt: >
      References supply an ordinary suburban Peelerz world and appetizing fruit character scale only. On a
      quiet evening street, one physical corner of the blue sky has lifted back in a continuous thin peel,
      revealing dense glowing lychee-pink atmosphere behind it. A polite queue of ordinary neighbors and small
      fruit gummy people waits behind a real velvet rope on the sidewalk for its turn beneath the opening.
      A bored attendant checks one gummy peel as admission. Wide deadpan documentary composition. No circular
      portal, theme-park sign, religious gate, rainbow, crowd frenzy, floating staircase, or transformed houses.

  - title: 08 rebuilt better
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../batch-15-raul-meg-assets-grape/outputs/2026-07-14/gemini-31-flash-lite-image/01_07-mango-crew-direct-turntable_090c3b00/07-mango-crew-direct-turntable_02.png
    prompt: >
      Image 1 locks the full-size sedan proportions and ordinary suburban driveway; Image 2 supplies helper
      scale and translucent mango material. At sunrise an ordinary middle-aged driver discovers a precise
      full-size replica of his sedan built from softly wobbling translucent gummy panels parked beside the real
      car. Small faceless fruit gummy helpers polish the replica; his palm gently dents its hood and it slowly
      springs back. Everything beyond this one material substitution is mundane. No candyland, tiny car, metal
      armor, melting vehicle, driver inside, animated headlights, or magical particles.

  - title: 09 all four worlds lean in
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 05 - park bench.png
      - ../../../script/PEELERZ - 09 - campus walk.png
      - ../../../script/PEELERZ - 14 - sky islands.png
    prompt: >
      References supply the four established worlds but not their original compositions. One impossibly wide
      aerial photograph shows four complete landscapes arranged around a central tropical fruit sea: suburban
      street with a rising asphalt ribbon, glowing football stadium, campus steps, and orange syrup-sunset city.
      The ground of each whole world physically curls inward as one vast peel segment around the central sea,
      bringing its roads and inhabitants toward the same destination. Continuous geology and shared horizon,
      not panels or portals. Show cause and attraction at planetary scale. No collage quadrants, random floating
      islands, giant fruit face, globe, map graphic, or empty abstraction.

  - title: 10 abstainers bite
    images:
      - ../../../script/PEELERZ - 01 - Tina in car.png
      - ../../../script/PEELERZ - 05 - park bench.png
      - ../../../script/PEELERZ - 09 - campus walk.png
      - ../../../script/PEELERZ - 11 - candy grove.png
    prompt: >
      References supply Tina, Raul, Meg, Liz, John, Peelerz product world, and live-action youth identity; place
      them together on a bright tropical beach. A middle-aged rideshare driver stands at center holding one tiny
      two-layer gummy at eye level. All five teenagers and hundreds of small fruit gummy people lean toward him
      in absolute expectant silence in the instant before he peels it. The driver is the only upright figure and
      looks dryly skeptical. Strong concentric desire composition. No worship, threat, crowd attack, oversized
      product, mascot faces, duplicate teenagers, or religious symbolism.

  - title: 11 islands want them
    images:
      - ../../../script/PEELERZ - 04 - parachute flight.png
      - ../../../script/PEELERZ - 14 - sky islands.png
      - ../../../references/amos-peelerz-all-3-flavors-w9ABMl70E60/selected/still-007.png
    prompt: >
      References lock the small approaching parachutes, tropical scale, and appetizing fruit-island material.
      Aerial evening view of a vast turquoise sea where dozens of full-size fruit-shaped islands are actively
      rearranging themselves through visible wakes into two enormous open welcoming arms around the approaching
      parachutes. Individual islands remain recognizable landscapes with beaches, trees, villages, and cliffs,
      while the collective arm gesture reads only at aerial scale. No literal giant body, hands rising from sea,
      heart shape, text, rainbow, static archipelago, or gummy-bear islands.
